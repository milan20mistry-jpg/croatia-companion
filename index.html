<!DOCTYPE html>
<html>

<head>

    <title>Croatia Companion</title>


    <!-- CSS -->
    <link rel="stylesheet" href="style.css">


    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">


</head>


<body>


    <!-- LEFT SIDEBAR -->

    <div id="sidebar">


        <h1>
            🇭🇷 Croatia Companion
        </h1>


        <!-- Search -->

        <input 
        type="text"
        id="search-box"
        placeholder="Search Croatia..."
        >



        <!-- Categories -->

        <h3>
            Explore
        </h3>


        <div id="categories">


            <button onclick="filterLocations('All')">
                🌍 All
            </button>


            <button onclick="filterLocations('Beaches')">
                🏖️ Beaches
            </button>


            <button onclick="filterLocations('Food')">
                🍽️ Food
            </button>


            <button onclick="filterLocations('History')">
                🏛️ History
            </button>


            <button onclick="filterLocations('Nature')">
                🌲 Nature
            </button>


            <button onclick="filterLocations('Islands')">
                🏝️ Islands
            </button>
            <button onclick="filterLocations('Ferry')">

⛴️ Ferry

</button>

        


        </div>



        <!-- Trip -->

<h3>
    ❤️ My Trip
</h3>


<div id="trip-list">

    No saved locations yet

</div>

<h3>
    🏠 Trip Base
</h3>


<input
type="text"
id="base-location"
placeholder="Where are you staying?"
>


<button onclick="saveBase()">

Save Base

</button>

<h3>
    📅 Itinerary
</h3>


<label>
    Start Date
</label>

<input 
type="date"
id="start-date"
>


<br><br>


<label>
    End Date
</label>

<input 
type="date"
id="end-date"
>


<br><br>


<button onclick="generateItinerary()">

    🗓️ Create Trip

</button>


<div id="itinerary">

</div>
<button onclick="planDay()">

🧭 Plan My Day

</button>


<div id="suggestions">

</div>



    </div>





    <!-- MAP -->

    <div id="map"></div>
    <div id="legend">

    <h3>Legend</h3>

    <p>🔴 Sightseeing</p>
    <p>🟡 Food</p>
    <p>🔵 Beaches</p>
    <p>🟢 Nature</p>
    <p>🟣 Islands</p>
    <p>🟠 Ferry</p>

</div>





    <!-- Leaflet -->

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


    <!-- Data -->

    <script src="data.js"></script>


    <!-- App -->

    <script src="app.js"></script>

<script>

if ("serviceWorker" in navigator) {

    navigator.serviceWorker.register("service-worker.js");

}

</script>
</body>

</html>
